<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Piyush & Kiran's Wedding Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #190a1a;
            --panel-bg: rgba(25, 10, 26, 0.75);
            --gold-accent: #e8c547;
            --text-light: #f3e5e8;
            --border-gold: linear-gradient(135deg, #d4af37, #f5e49e, #aa7c11, #d4af37);
        }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden !important;
            position: fixed; background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif; color: var(--text-light);
            display: flex; justify-content: center; align-items: center; touch-action: none;
        }
        .wrapper {
            width: min(90%, 400px); background: var(--panel-bg); border-radius: 28px;
            padding: 40px 30px; text-align: center; backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative; z-index: 10;
        }
        .wrapper::after {
            content: ''; position: absolute; inset: 0; border-radius: 28px; padding: 1.5px;
            background: var(--border-gold); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }
        .title { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: var(--gold-accent); margin-bottom: 10px; }
        .intro-text { font-size: 0.88rem; line-height: 1.6; color: #d8c2d4; margin-bottom: 25px; }
        .login-box { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .input-group { width: 100%; text-align: left; }
        .input-group label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: #c9afc4; margin-bottom: 6px; display: block; }
        .input-group input {
            display: block; width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff;
            font-size: 1.15rem; letter-spacing: 5px; text-align: center; outline: none;
        }
        .input-group input:focus { border-color: var(--gold-accent); }
        .login-btn {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #e8c547, #cfa832);
            border: none; border-radius: 12px; color: #190a1a; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .error-message { color: #ff6b6b; font-size: 0.8rem; margin-top: 2px; opacity: 0; transition: opacity 0.3s ease; }
    </style>
</head>
<body>
    <audio id="weddingMusic" src="music/wedding.mp3" loop></audio>

    <div class="wrapper">
        <h2 class="title">Our Celebration</h2>
        <p class="intro-text">Welcome to our wedding portal. Please enter your 6-digit access code.</p>
        <div class="login-box">
            <div class="input-group">
                <label for="inviteCode">Access Code</label>
                <input type="text" id="inviteCode" placeholder="••••••" maxlength="6" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
            </div>
            <div id="errorMsg" class="error-message">Invalid access code. Please try again.</div>
            <button class="login-btn" onclick="validateAccess()">Verify Code</button>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbyt542B02ayofGz1Rlx6OK5Sl5anz1YIGme2mu-J5Xsi21xvfgs0bbD-IbfdukFwwo/exec';

        function startMusic() {
            const music = document.getElementById('weddingMusic');
            music.play().then(() => {
                localStorage.setItem('playMusic', 'true');
            }).catch(err => {
                console.log("Audio awaiting user interaction...");
            });
        }

        // Tap/Click anywhere on screen triggers the background music start
        document.body.addEventListener('click', startMusic, { once: true });

        async function validateAccess() {
            const codeInput = document.getElementById('inviteCode').value.trim();
            const errorElement = document.getElementById('errorMsg');

            if (!codeInput || codeInput.length !== 6) {
                errorElement.textContent = "Please enter a 6-digit code.";
                errorElement.style.opacity = '1';
                return;
            }

            try {
                // Ensure music starts playing immediately upon validation click
                startMusic();

                const timestamp = new Date().getTime();
                // Send GET Request with action parameter to avoid browser file:// local blocks
                const requestUrl = `${API}?action=login&code=${codeInput}&_cb=${timestamp}`;

                const response = await fetch(requestUrl, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-store'
                });
                
                const data = await response.json();

                if (data && data.found && data.active) {
                    errorElement.style.opacity = '0';
                    localStorage.setItem('guest', codeInput); 
                    
                    // Store current playhead timestamp of the track so next page matches perfectly
                    const music = document.getElementById('weddingMusic');
                    localStorage.setItem('musicTime', music.currentTime);

                    window.location.href = 'personalized_invite.html?guest=' + encodeURIComponent(codeInput);
                } else {
                    errorElement.textContent = "Invalid access code.";
                    errorElement.style.opacity = '1';
                    document.getElementById('inviteCode').value = '';
                }
            } catch (error) {
                console.error("Database connection error:", error);
                errorElement.textContent = "Database connection error. Try again.";
                errorElement.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
