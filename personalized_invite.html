<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Personal Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #190a1a;
            color: #f3e5e8;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #e8c547; }
        .card {
            background: rgba(25, 10, 26, 0.8);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            border: 1.5px solid #e8c547;
        }
    </style>
</head>
<body>
    <audio id="weddingMusic" src="music/wedding.mp3" loop></audio>

    <div class="card">
        <h1>Welcome, <span id="guestName">Guest</span>!</h1>
        <p>You have logged in successfully to our wedding portal.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('guest');
        const API = 'https://script.google.com/macros/s/AKfycbyt542B02ayofGz1Rlx6OK5Sl5anz1YIGme2mu-J5Xsi21xvfgs0bbD-IbfdukFwwo/exec';

        // Play/Sync background music from where it was left off
        window.addEventListener('load', () => {
            const music = document.getElementById('weddingMusic');
            const playMusic = localStorage.getItem('playMusic');
            const savedTime = localStorage.getItem('musicTime');

            if (music && playMusic === 'true') {
                if (savedTime) {
                    music.currentTime = parseFloat(savedTime);
                }
                music.play().catch(err => {
                    console.log("Awaiting user gesture to play audio...");
                    document.body.addEventListener('click', () => {
                        music.play();
                    }, { once: true });
                });
            }
        });

        if (!code) {
            window.location.href = 'index.html';
        } else {
            // Fetch personalized details safely via GET
            fetch(`${API}?type=guest&guest=${code}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.found) {
                        document.getElementById('guestName').textContent = data.name;
                    }
                })
                .catch(err => console.log(err));
        }
    </script>
</body>
</html>
